<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet3D Side Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
</head>
<body class="bg-[#1e1f24] text-white p-4 font-sans">
    <div id="root" class="flex flex-col gap-6">
        <header class="flex items-center gap-2 border-b border-gray-700 pb-4">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            </div>
            <h1 class="text-xl font-bold">Meet3D</h1>
        </header>

        <section class="space-y-4">
            <p class="text-gray-400 text-sm">ברוכים הבאים לכיתת המטאברס שלכם. מוכנים לעבור ל-3D?</p>

            <button id="launchBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 group">
                <span>הצטרף לכיתת 3D</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </section>

        <section class="bg-[#2d2f35] p-4 rounded-xl border border-gray-700">
            <h2 class="text-sm font-semibold mb-2 text-indigo-400">הגדרות אבטר</h2>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center">
                    <span class="text-xs">You</span>
                </div>
                <span class="text-sm">סטודנט #1</span>
                <button class="mr-auto text-xs text-indigo-400 hover:underline">ערוך</button>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Initialize Google Meet Add-on SDK
                const session = await window.meet.addon.createAddonSession();
                console.log("Meet3D Side Panel Initialized", session);

                const launchBtn = document.getElementById('launchBtn');
                launchBtn.addEventListener('click', async () => {
                    // This launches the Main Stage for everyone (Collaboration)
                    await session.createMainStageApp({
                        url: 'https://localhost:3000/mainstage.html'
                    });
                });
            } catch (err) {
                console.error("SDK Initialization failed", err);
            }
        });
    </script>
</body>
</html>
