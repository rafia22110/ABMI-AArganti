<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet3D Main Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; position: relative; }
        #overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .badge {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="overlay">
            <div class="badge">כיתת מטאברס 3D - פעילה</div>
            <div class="badge" id="participant-count">משתתפים: 1</div>
        </div>
    </div>

    <script>
        // --- 1. Three.js Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Grid helper to show the "floor"
        const gridHelper = new THREE.GridHelper(10, 10, 0x4f46e5, 0x222222);
        scene.add(gridHelper);

        // Placeholder for an avatar (a simple colored cube for now)
        const geometry = new THREE.BoxGeometry(1, 2, 1);
        const material = new THREE.MeshPhongMaterial({ color: 0x4f46e5 });
        const avatar = new THREE.Mesh(geometry, material);
        avatar.position.y = 1;
        scene.add(avatar);

        // Lighting
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(0, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 2. Google Meet Add-on SDK Integration ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const session = await window.meet.addon.createAddonSession();
                console.log("Meet3D Main Stage Initialized", session);

                // Track participants joining the 3D space
                const pCountEl = document.getElementById('participant-count');

                // Example of syncing movement (conceptual)
                // session.onSyncEvent((event) => {
                //    if (event.type === 'move') { updateAvatarPos(event.userId, event.pos); }
                // });

            } catch (err) {
                console.error("SDK Initialization failed", err);
            }
        });

        // --- 3. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Simple idle animation for our avatar
            avatar.rotation.y += 0.01;
            avatar.position.y = 1 + Math.sin(Date.now() * 0.005) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        // Handle Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
